<!DOCTYPE html>
<html>
    <head>
    <title>GTM Lead Engine</title>

        <style>
            body {
                font-family: Arial;
                margin: 40px;
            }

            .card {
                border: 1px solid #ddd;
                padding: 15px;
                margin-bottom: 15px;
                max-width: 800px;
            }

            pre {
                white-space: pre-wrap;
                word-wrap: break-word;
                overflow-wrap: break-word;
                max-width: 100%;
            }
        </style>
    </head>

    <body>
        <h1>GTM Lead Engine</h1>

        {% for r in results %}
            <div class="card">
                <h2>{{ r.company }}</h2>
                <p class="score">Score: {{ r.score }}</p>
                <pre>{{ r.email }}</pre>
            </div>
        {% endfor %}
    </body>
</html>
